version: "3.9"

services:
  app:
    build: .
    container_name: subscription_app
    ports:
      - "8080:8080"
    depends_on:
      - db
    env_file:
      - .env

  db:
    image: postgres:15
    container_name: subscription_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: subscriptions
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      
  migrate:
    image: migrate/migrate
    container_name: subscription_migrate
    depends_on:
      - db
    volumes:
      - ./migrations:/migrations
    command: [
      "-path=/migrations",
      "-database=postgres://postgres:postgres@db:5432/subscriptions?sslmode=disable",
      "up"
    ]

volumes:
  postgres_data:
